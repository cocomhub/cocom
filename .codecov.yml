codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 20%
        threshold: 2%
    patch:
      default:
        target: 80%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
