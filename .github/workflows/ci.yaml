name: test

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - 'LICENSE'
      - 'assets/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - 'LICENSE'
      - 'assets/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install WebP tools
        run: make install-webp-tools
      - name: Test with coverage
        run: make test-cover
      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@v7
        with:
          files: build/cover.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Coverage check
        run: make cover-check
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: build/cover.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Prepare version info
        run: make prepare
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Build
        run: make build-ci
      - name: Build all sub-modules
        run: make build-all

  sonar:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install WebP tools
        run: make install-webp-tools
      - name: Test with coverage
        run: make test-cover
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  benchmark:
    runs-on: ubuntu-latest
    needs: [unit-test]
    permissions:
      contents: write   # 允许推送到 gh-pages 分支
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install WebP tools
        run: make install-webp-tools
      - name: Run benchmarks
        run: make bench
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'go'
          output-file-path: build/bench/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true

  playwright:
    runs-on: ubuntu-latest
    needs: [build]
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install Playwright browsers
        run: |
          go run github.com/playwright-community/playwright-go/cmd/playwright@latest install --with-deps chromium
      - name: Run E2E tests
        run: go test -v -count=1 -timeout=5m ./...
        env:
          HEADLESS: "true"
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-artifacts
          path: tests/e2e/test-artifacts/
          retention-days: 3
