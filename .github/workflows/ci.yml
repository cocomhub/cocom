name: test

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - 'LICENSE'
      - 'assets/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - 'LICENSE'
      - 'assets/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install WebP tools
        run: make install-webp-tools
      - name: Test with coverage
        run: make test-cover
      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: build/cover.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Coverage check
        run: make cover-check
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: build/cover.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Prepare version info
        run: make prepare
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: latest
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Build
        run: make build-ci
      - name: Build all sub-modules
        run: make build-all

  sonar:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install WebP tools
        run: make install-webp-tools
      - name: Test with coverage
        run: make test-cover
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # auto-push 需要
      deployments: write
      pull-requests: write # 允许创建PR Review评论
    needs: [unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install WebP tools
        run: make install-webp-tools
      - name: Run benchmarks
        run: make bench
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba  # v1.22.1
        continue-on-error: true
        with:
          tool: go
          output-file-path: build/bench/bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
          skip-fetch-gh-pages: false
          comment-always: true
          summary-always: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

  playwright:
    runs-on: ubuntu-latest
    needs: [build]
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install Playwright browsers
        run: |
          go run github.com/playwright-community/playwright-go/cmd/playwright@v0.5700.1 install --with-deps chromium
      - name: Run E2E tests
        run: go test -v -count=1 -timeout=5m ./...
        env:
          HEADLESS: "true"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-artifacts
          path: tests/e2e/screenshots/
          retention-days: 3
