# golangci-lint 配置文件
# 参考: https://golangci-lint.run/usage/configuration/
# v2 格式: https://golangci-lint.run/docs/product/migration-guide

version: "2"
run:
  go: "1.26"
linters:
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (net.Conn).Close
        - (net/http.Response).Body.Close
        - (database/sql.DB).Close
        - (database/sql.Rows).Close
        - (database/sql.Stmt).Close
        - (github.com/cocomhub/cocom/cmd/server/internal/setting/mongoCursor).Close
        - (github.com/cocomhub/cocom/pkg/comic/storage/mongoCursor).Close
        - (github.com/cocomhub/cocom/pkg/comic/mongoCursor).Close
        - fmt.Fprintf
        - os.Remove
        - os.RemoveAll
    govet:
      enable:
        - shadow
    staticcheck:
      checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
