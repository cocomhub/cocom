# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: cocom

# --- Metadata & Timestamps (官方最佳实践) ---
# 确保所有生成的文件时间戳基于 Git Commit，而非当前时间
git:
  ignore_tags:
    - nightly
    - "*-nightly"

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    # You may remove this if you don't use go modules.
    - make install-tools
    - make build

builds:
  - main: ./...
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w
      - -X '{{ .ModulePath }}/pkg/version.Version={{ .Summary }}'
      - -X '{{ .ModulePath }}/pkg/version.BuiltAt={{ .Date }}'
      - -X '{{ .ModulePath }}/pkg/version.CommitID={{ .FullCommit }}'
      - -X '{{ .ModulePath }}/pkg/version.Branch={{ .Branch }}'
      - -X '{{ .ModulePath }}/pkg/version.ReleaseURL={{ .ReleaseURL }}'
    flags:
      - -trimpath

archives:
  - id: default
    formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    builds_info:
      group: root
      owner: root
      mtime: "{{ .CommitDate }}"
    files:
      - src: README.md
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: CHANGELOG.md
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: LICENSE
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: completions/*.zsh
        dst: share/zsh/site-functions
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: completions/*.bash
        dst: share/bash-completion/completions
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: completions/*.fish
        dst: share/fish/vendor_completions.d
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: manpages/*
        dst: share/man
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"

homebrew_casks:
  - name: cocom
    binaries:
      - cocom
      - pixcover
      - pixm
      - arctl
    repository:
      owner: cocomhub
      name: homebrew-tap
      branch: "{{.ProjectName}}-{{.Version}}"
      token: "{{ .Env.GH_PAT }}"
      pull_request:
        enabled: true
        base:
          owner: cocomhub
          name: homebrew-tap
          branch: main
    homepage: https://github.com/cocomhub/cocom
    description: Comic manager
    license: Apache-2.0
    manpages:
      - share/man/arctl.1.gz
      - share/man/cocom.1.gz
      - share/man/pixcover.1.gz
      - share/man/pixm.1.gz
    completions:
      bash: share/bash-completion/completions/cocom.bash
      zsh: share/zsh/site-functions/cocom.zsh
      fish: share/fish/vendor_completions.d/cocom.fish
    custom_block: |
      module GitHubHelper
        define_singleton_method(:token) do
          require "utils/github"
      
          # Prefer environment variable if available
          github_token = ENV.fetch("HOMEBREW_GITHUB_API_TOKEN", nil)
          github_token ||= GitHub::API.credentials
          raise "Failed to retrieve github api token" if github_token.blank?
      
          github_token
        end
      
        define_singleton_method(:release_asset_url) do |tag, name|
          require "json"
          require "net/http"
          require "uri"

          puts "Fetching URL for tag: #{tag}, name: #{name}"
      
          resp = Net::HTTP.get(
            # Replace with your GitHub repository URL
            URI.parse("https://api.github.com/repos/cocomhub/cocom/releases/tags/#{tag}"),
            {
              "Accept"               => "application/vnd.github+json",
              "Authorization"        => "Bearer #{token}",
              "X-GitHub-Api-Version" => "2022-11-28",
            },
          )
      
          release = JSON.parse(resp)
          release["assets"].find { |asset| asset["name"] == name }["url"]
        end
      end
      
    url:
      template: '#{GitHubHelper.release_asset_url("{{.Tag}}", "{{.ArtifactName}}").to_s}'
      headers:
        - "Accept: application/octet-stream"
        - "Authorization: Bearer #{GitHubHelper.token}"
        - "X-GitHub-Api-Version: 2022-11-28"

changelog:
  sort: asc
  use: github

  filters:
    exclude:
      - "^test:"
      - "^test\\("
      - "^chore: update$"
      - "^chore: docs$"
      - "^docs: update$"
      - "^chore: schema$"
      - "^chore: typo$"
      - "^chore: auto-update generated files$"
      - "^chore: update schema$"
      - "^chore: schema update$"
      - "^chore\\(deps\\): "
      - "^(build|ci): "
      - "^ci\\("
      - "merge conflict"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 100
    - title: "Security updates"
      regexp: '^.*?sec(\(.+\))??!?:.+$'
      order: 150
    - title: "Bug fixes"
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 200
    - title: "Documentation updates"
      regexp: ^.*?docs?(\(.+\))??!?:.+$
      order: 400
    - title: Other work
      order: 9999

release:
  footer: >-

    ---

    **Full Changelog**: https://github.com/cocomhub/cocom/compare/{{ .PreviousTag }}...{{ .Tag }}

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
