server:
  listen:
    http:
      addr: 0.0.0.0:15457
  access_log:
  admin:
    allow_remote: true
    token: cocom
  scheduler:
    enabled: true
    probe_comic:
      enabled: false
      name: ProbeComic
      cron: "0 */10 * * * *"
      tags:
        - probe
        - comic
    cocoma_archiver:
      enabled: false
      cron: "* * * * *"
      limit: 2000
      cid_regex: "^(\\d+)\\.cocoma$"
      scan_dir: "/Volumes/O2-18T-E1/已删除或丢失/SA-1/cocom/data"
      archive_dir: "/Volumes/O2-18T-E1/baiduSync/cocom"
      notmatch_dir: "/Volumes/O2-18T-E1/cocom/archive-notmatch"
    archive_status_check:
      enabled: false
      #cron: "0 */30 * * * *"
      cron: "*/5 * * * * *"
      limit: 100000
      max_conn: 10
      backends:
        - archive-backup-baidupcs

