port: 35456

log:
  enableFile: true
  filename: ./logs/cocom.log
  fileLevel: debug
  enableConsole: true
  consoleLevel: debug
  appName: cocom-server-dev

cocom:
  storage:
    path: /opt/cocom/data/gallery
  archive:
    path: /opt/cocom/data/archive
    temp_path: /opt/cocom/data/archive-temp
    password: "cocom"
    cmd: 7z
    algorithm: double

client:
  server_addr: http://192.168.31.100:15456

mongo:
#  host: mini.local:27017
  host: 192.168.31.100:27017

download:
  maxRunning: 10
  downloadDir: ./Down

comic:
  download:
    maxDownloadSize: 3
  mongo:
    database: cocom
    collections:
      comicInfo: comicInfo

archive:
  manager:
    algorithm: double
    index:
      type: file
      fileStoreName: archive-manager-index
      fileStorePrefix: archive/index

storage:
  backends:
    - name: archive-manager-index
      type: localfs
      metadata:
        root: /opt/cocom/data/archive-index
    - name: archive-backup
      type: localfs
      metadata:
        root: /opt/cocom/data/archive-backup

arctl:
  output: "text"
  verbose: false
  archive:
    manager:
      algorithm: double
      index:
        type: "file"
        fileStoreName: arctl-archive-manager-index
        fileStorePrefix: "archive/index"
