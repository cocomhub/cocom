sonar.projectKey=cocomhub_cocom
sonar.organization=cocomhub
sonar.host.url=https://sonarcloud.io
sonar.go.coverage.reportPaths=build/cover.out
# 额外排除 e2e 测试（如果不想扫描）
sonar.test.exclusions=tests/e2e/**
sonar.sourceEncoding=UTF-8
sonar.sources=.
sonar.exclusions=**/*_test.go,tests/**,build/**,tools/**,node_modules/**,.claude/**,.trae/**,.cursor/**
# 测试源码目录（同样扫描所有目录，但只包含测试文件）
sonar.tests=.
sonar.test.inclusions=**/*_test.go
